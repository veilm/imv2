image: archlinux
packages:
  - asciidoc
  - clang
  - cmocka
  - icu
  - lcms2
  - libglvnd
  - libheif
  - libinih
  - libjpeg-turbo
  - libjxl
  - libnsgif
  - libnsbmp
  - libpng
  - librsvg
  - libtiff
  - libwebp
  - libx11
  - libxcb
  - libxkbcommon
  - libxkbcommon-x11
  - meson
  - pango
  - qoi
  - wayland
  - wayland-protocols
  - tinyxxd
sources:
  - https://git.sr.ht/~exec64/imv
tasks:
  - gcc: |
      CC=gcc meson setup imv build_gcc -D auto_features=enabled -Dwerror=true
      CC=gcc ninja -C build_gcc test
  - clang: |
      CC=clang meson setup imv build_clang -D auto_features=enabled -Dwerror=true
      CC=clang ninja -C build_clang test
