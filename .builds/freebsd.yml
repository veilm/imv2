image: freebsd/latest
packages:
  - devel/icu
  - devel/meson
  - devel/pkgconf
  - devel/inih
  - graphics/lcms2
  - graphics/libglvnd
  - graphics/libheif
  - graphics/libjpeg-turbo
  - graphics/libjxl
  - graphics/libnsgif
  - graphics/libnsbmp
  - graphics/librsvg2-rust
  - graphics/webp
  - graphics/png
  - graphics/tiff
  - graphics/wayland-protocols
  - sysutils/cmocka
  - textproc/asciidoc
  - x11-toolkits/pango
  - x11/libxcb
  - x11/libxkbcommon
  - xxd
sources:
  - https://git.sr.ht/~exec64/imv
tasks:
  # FreeBSD's libheif is outdated and contains functions without prototypes in
  # its headers and type redefintions
  # FreeBSD does not have a qoi package
  - meson: |
      meson setup imv build -D auto_features=enabled -D c_link_args='-L/usr/local/lib' -Dwerror=true -Dqoi=disabled -Dc_args='-Wno-strict-prototypes -Wno-typedef-redefinition'
      ninja -C build test
